version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"
    volumes:
      - aegis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aegis-app
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      ENV: development
      DATABASE_URL: postgres://aegis:aegis@postgres:5432/aegis?sslmode=disable
      DB_MAX_CONNS: 25
      DB_MIN_CONNS: 5
      MASTER_KEY: ${MASTER_KEY}
      DEFAULT_RATE_LIMIT: 60
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  aegis_pgdata:
