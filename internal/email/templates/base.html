{{define "base"}}
<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="color-scheme" content="dark">
  <meta name="supported-color-schemes" content="dark">
  <title>{{.Subject}}</title>
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings>
        <o:AllowPNG/>
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <![endif]-->
  <style>
    /* Reset */
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
    body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; }

    /* Dark mode support */
    :root { color-scheme: dark; supported-color-schemes: dark; }

    /* Typography */
    body, td, th, p, div, li, a, span {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    /* Link styles */
    a { color: #8B5CF6; text-decoration: none; }
    a:hover { color: #A78BFA; }

    /* Responsive */
    @media only screen and (max-width: 600px) {
      .email-container { width: 100% !important; max-width: 100% !important; }
      .email-content { padding: 24px 20px !important; }
      .code-block { font-size: 28px !important; letter-spacing: 6px !important; padding: 16px 24px !important; }
      .header-logo { padding: 24px 20px !important; }
      .footer-content { padding: 20px !important; }
    }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #0A0A0F; width: 100%; -webkit-font-smoothing: antialiased;">

  <!-- Preheader (hidden text for email previews) -->
  <div style="display: none; font-size: 1px; line-height: 1px; max-height: 0px; max-width: 0px; opacity: 0; overflow: hidden; mso-hide: all;">
    {{.Preheader}}
  </div>

  <!-- Outer wrapper -->
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #0A0A0F;">
    <tr>
      <td align="center" style="padding: 40px 16px;">

        <!-- Email container -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="560" class="email-container" style="max-width: 560px; width: 100%;">

          <!-- Header with Logo -->
          <tr>
            <td class="header-logo" style="padding: 32px 40px 24px; text-align: center;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td align="center">
                    <!-- Aegis Logo Mark -->
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0">
                      <tr>
                        <td style="background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%); width: 36px; height: 36px; border-radius: 10px; text-align: center; vertical-align: middle; font-size: 18px; font-weight: 700; color: #FFFFFF; mso-line-height-rule: exactly; line-height: 36px;">
                          A
                        </td>
                        <td style="padding-left: 10px; font-size: 20px; font-weight: 700; color: #F5F5F7; letter-spacing: -0.3px;">
                          Aegis
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Main content card -->
          <tr>
            <td>
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #13131A; border: 1px solid rgba(139, 92, 246, 0.15); border-radius: 16px; overflow: hidden;">
                <!-- Purple accent line at top -->
                <tr>
                  <td style="background: linear-gradient(90deg, #8B5CF6 0%, #6D28D9 50%, #5B21B6 100%); height: 3px; font-size: 0; line-height: 0;">&nbsp;</td>
                </tr>

                <!-- Content block -->
                <tr>
                  <td class="email-content" style="padding: 40px;">
                    {{template "content" .}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td class="footer-content" style="padding: 28px 40px; text-align: center;">
              <!-- Divider -->
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td style="border-top: 1px solid rgba(255, 255, 255, 0.06); padding-top: 24px;">
                    <p style="margin: 0 0 8px; font-size: 13px; line-height: 20px; color: #6B6B80;">
                      Sent by <span style="color: #8B5CF6; font-weight: 600;">Aegis</span> — Secure secrets management
                    </p>
                    <p style="margin: 0 0 16px; font-size: 12px; line-height: 18px; color: #4A4A5A;">
                      You're receiving this because your email address was used to create an Aegis account.
                    </p>
                    <p style="margin: 0; font-size: 11px; line-height: 16px; color: #3A3A4A;">
                      &copy; {{.Year}} Aegis. All rights reserved.
                    </p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

        </table>
        <!-- /Email container -->

      </td>
    </tr>
  </table>

</body>
</html>
{{end}}
